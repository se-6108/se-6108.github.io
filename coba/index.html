<script>
  // =========================================================================
  // KONFIGURASI URL API GAS
  // =========================================================================
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxSfOmssbzxzyoNXRdRtFFkXLxyFNJc7KNdPpL8h63H2p-7htGTtj7L7EXZ8QzhnUSP/exec";

  // State Variables
  let DASH_DATA = [];
  let dashFilteredData = [];
  let TAB_STATE = { 1:[], 2:[], 3:[], 4:[], 6:[], 7:[], 8:[] }; 
  let COLUMN_FILTERS = { 1:{}, 2:{}, 3:{}, 4:{}, 6:{}, 7:{}, 8:{} }; 
  let dashCurrentPage = 1;
  let dashRowsPerPage = 10; 
  let activeTabId = 1;
  let sortCol = '', sortAsc = true;
  
  // Custom Filter State
  let activeFilters = { kec: [], pml: [], ppl: [], pj: [], statusPetugas: [], prio: '' };
  
  let chartKecObj;
  let kecChartMapGlobal = {};
  let timingConfig = {};

  // Hotkeys Ninja
  let keyStrokes = '';
  document.addEventListener('keydown', (e) => {
      if(e.key.toLowerCase() === 'f') {
          keyStrokes += 'f';
          if(keyStrokes.includes('ffff')) {
              const btn = document.getElementById('btnAdminUpload');
              btn.classList.toggle('hidden');
              btn.classList.toggle('flex');
              keyStrokes = '';
              Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Panel Admin Aktif!', showConfirmButton: false, timer: 1500 });
          }
      } else { keyStrokes = ''; }
  });

  // Dropdown Logic (Menutup dropdown jika klik di luar)
  document.addEventListener('click', (e) => {
      if(!e.target.closest('.filter-dropdown')) {
          document.querySelectorAll('.filter-menu').forEach(menu => menu.classList.add('hidden'));
      }
  });

  window.onload = function() {
      initDashboard();
  };

  function toProperCase(str) {
      if (!str) return '';
      return str.toLowerCase().replace(/(^|\s)\S/g, function(s) { return s.toUpperCase(); }).trim();
  }

  function getHariPendataan() {
      const now = new Date();
      const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
      const wib = new Date(utc + (3600000 * 7));

      let actualDate = new Date(wib);
      let effectiveDate = new Date(wib);
      if (wib.getHours() < 21) { effectiveDate.setDate(effectiveDate.getDate() - 1); }

      const startYear = 2026; const startMonth = 5; const startDateDate = 15; // Juni (Bulan 5)
      const endYear = 2026; const endMonth = 7; const endDateDate = 31; // Agustus

      const startDateUTC = Date.UTC(startYear, startMonth, startDateDate);
      const endDateUTC = Date.UTC(endYear, endMonth, endDateDate);

      const actualDateUTC = Date.UTC(actualDate.getFullYear(), actualDate.getMonth(), actualDate.getDate());
      let actualDiffDays = Math.floor((actualDateUTC - startDateUTC) / (1000 * 60 * 60 * 24)) + 1;

      const effectiveDateUTC = Date.UTC(effectiveDate.getFullYear(), effectiveDate.getMonth(), effectiveDate.getDate());
      let effectiveDiffDays = Math.floor((effectiveDateUTC - startDateUTC) / (1000 * 60 * 60 * 24)) + 1;
      const maxDays = Math.floor((endDateUTC - startDateUTC) / (1000 * 60 * 60 * 24)) + 1;

      if (actualDiffDays < 1) actualDiffDays = 1;
      if (actualDiffDays > maxDays) actualDiffDays = maxDays;
      if (effectiveDiffDays < 1) effectiveDiffDays = 1;
      if (effectiveDiffDays > maxDays) effectiveDiffDays = maxDays;

      let targetPercentage = Math.min(effectiveDiffDays * 1.34, 100);
      return { x: actualDiffDays, y: targetPercentage, effDay: effectiveDiffDays };
  }

  function initDashboard() {
      const globalLoader = document.getElementById('globalLoading');
      timingConfig = getHariPendataan();
      
      if (document.getElementById('badgeHari')) document.getElementById('badgeHari').innerText = `HARI KE - ${timingConfig.x}`;
      if (document.getElementById('badgeTarget')) document.getElementById('badgeTarget').innerText = `TARGET : ${timingConfig.y.toFixed(2)}%`;

      fetch(GAS_API_URL)
        .then(response => {
           if (!response.ok) throw new Error("Jaringan bermasalah atau URL API salah.");
           return response.json();
        })
        .then(res => {
          res.data.forEach(row => {
              row.pml = toProperCase(row.pml);
              row.ppl = toProperCase(row.ppl);
              row.pj = toProperCase(row.pj);
              row.kec = toProperCase(row.kec);
          });

          DASH_DATA = res.data;
          if(globalLoader) globalLoader.classList.add('hidden');
          
          if(document.getElementById('txtLastUpdate')) {
              document.getElementById('txtLastUpdate').innerText = res.lastUpdate;
          }

          initCustomDropdowns();
          buildTableHeaders(); 
          handleGlobalFilter(); 
        })
        .catch(err => {
          if(globalLoader) globalLoader.classList.add('hidden');
          Swal.fire("Gagal Memuat Data", err.message, "error");
        });
  }

  // =========================================================================
  // CUSTOM DROPDOWN CHECKBOX (MENGGANTIKAN TOMSELECT)
  // =========================================================================
  function initCustomDropdowns() {
    let k = [...new Set(DASH_DATA.map(d=>d.kec ? String(d.kec) : ''))].sort();
    let pm = [...new Set(DASH_DATA.map(d=>d.pml ? String(d.pml) : ''))].sort();
    let pp = [...new Set(DASH_DATA.map(d=>d.ppl ? String(d.ppl) : ''))].sort();
    let pj = [...new Set(DASH_DATA.map(d=>d.pj ? String(d.pj) : ''))].sort();
    
    renderCheckboxes('dropKec', k, 'kec');
    renderCheckboxes('dropPml', pm, 'pml');

  function openFilterModal(tId, colKey, colName) {
      let currentFilter = COLUMN_FILTERS[tId][colKey] || { mode: 'all', val: '' };
      
      Swal.fire({
          title: '<span class="text-lg font-bold text-slate-800">Saring: ' + colName + '</span>',
          html: `
              <div class="text-left text-sm mt-2">
                  <label class="block mb-1 font-semibold text-gray-700">Pilih Mode Saringan:</label>
                  <select id="swal-filter-mode" class="w-full border border-gray-300 p-2 rounded mb-3 bg-gray-50 outline-none font-medium text-gray-700">
                      <option value="all">Menampilkan Semua Data</option>
                      <option value="gt">Lebih Dari ( > )</option>
                      <option value="lt">Kurang Dari ( < )</option>
                      <option value="eq">Spesifik Sama Dengan ( = )</option>
                  </select>
                  <div id="swal-filter-val-container" class="hidden">
                      <label class="block mb-1 font-semibold text-gray-700">Masukkan Angka:</label>
                      <input type="number" id="swal-filter-val" class="w-full border border-gray-300 p-2 rounded bg-gray-50 outline-none font-medium text-slate-800" placeholder="0">
                  </div>
              </div>
          `,
          showCancelButton: true, confirmButtonText: 'Terapkan', cancelButtonText: 'Batal',
          customClass: { confirmButton: 'bg-blue-600 text-white px-4 py-2 rounded font-semibold', cancelButton: 'bg-gray-200 text-gray-800 px-4 py-2 rounded font-semibold' },
          didOpen: () => {
              let mode = document.getElementById('swal-filter-mode');
              let valCont = document.getElementById('swal-filter-val-container');
              let valInput = document.getElementById('swal-filter-val');
              
              mode.value = currentFilter.mode; 
              valInput.value = currentFilter.val;
              
              if(currentFilter.mode !== 'all') valCont.classList.remove('hidden');
              mode.onchange = () => { 
                  if(mode.value === 'all') valCont.classList.add('hidden'); 
                  else valCont.classList.remove('hidden'); 
              };
          },
          preConfirm: () => {
              let m = document.getElementById('swal-filter-mode').value; 
              let v = document.getElementById('swal-filter-val').value;
              if(m !== 'all' && v === '') { Swal.showValidationMessage('Nilai angka tidak boleh kosong!'); return false; }
              return { mode: m, val: v };
          }
      }).then(res => {
          if(res.isConfirmed) {
              if(res.value.mode === 'all') delete COLUMN_FILTERS[tId][colKey];
              else COLUMN_FILTERS[tId][colKey] = res.value;
              dashCurrentPage = 1;
              renderCurrentTab();
          }
      });
  }

  function applyHeaderFilters(dataArr, tId) {
      let filtered = dataArr;
      let colFilters = COLUMN_FILTERS[tId] || {};
      Object.keys(colFilters).forEach(k => {
          let f = colFilters[k];
          let fv = Number(f.val);
          if(f.mode === 'gt') filtered = filtered.filter(r => Number(r[k]||0) > fv);
          else if(f.mode === 'lt') filtered = filtered.filter(r => Number(r[k]||0) < fv);
          else if(f.mode === 'eq') filtered = filtered.filter(r => Number(r[k]||0) === fv);
      });
      return filtered;
  }

  function switchTab(tabId) {
     if (!DASH_DATA || DASH_DATA.length === 0) return; // Defensive jika belum load

     if(activeTabId !== tabId) dashCurrentPage = 1; 
     activeTabId = tabId;
     
     if ([2, 3, 4].includes(tabId)) {
        dashRowsPerPage = 999999;
        if(document.getElementById('perPageSelect')) document.getElementById('perPageSelect').value = "999999";
     } else {
        dashRowsPerPage = parseInt(document.getElementById('perPageSelect').value) || 10;
        if (dashRowsPerPage === 999999) { 
            dashRowsPerPage = 10;
            if(document.getElementById('perPageSelect')) document.getElementById('perPageSelect').value = "10";
        }
     }
     
     [1,2,3,4,5,6,7,8].forEach(i => {
        let btn = document.getElementById('btnTab'+i);
        if(btn) btn.className = btn.className.replace(/border-blue-600|border-amber-600|border-purple-600|border-emerald-600|text-blue-700|text-amber-600|text-purple-600|text-emerald-600/g, "border-transparent text-gray-500");
        let tc = document.getElementById('tab'+i+'-content'); if(tc) { tc.classList.add('hidden'); tc.classList.remove('block'); }
     });
     
     let btnAct = document.getElementById('btnTab'+tabId);
     if(btnAct) {
        btnAct.classList.remove("border-transparent", "text-gray-500");
        if(tabId===6) btnAct.classList.add("border-amber-600", "text-amber-600");
        else if(tabId===7) btnAct.classList.add("border-purple-600", "text-purple-600");
        else if(tabId===8) btnAct.classList.add("border-emerald-600", "text-emerald-600");
        else btnAct.classList.add("border-blue-600", "text-blue-700");
     }
     
     if(document.getElementById('tab'+tabId+'-content')) document.getElementById('tab'+tabId+'-content').classList.remove('hidden');
     if(document.getElementById('paginasiArea')) document.getElementById('paginasiArea').style.display = ([1,2,3,4,6,7,8].includes(tabId)) ? 'flex' : 'none';
     
     renderCurrentTab();
  }

  function applySort(col) {
      if(sortCol === col) sortAsc = !sortAsc; 
      else { sortCol = col; sortAsc = true; }
      renderCurrentTab();
  }

  function sortLogic(arr, col, isAsc) {
     arr.sort((a, b) => {
        let valA = a[col]; let valB = b[col];
        if (typeof valA === 'number' && typeof valB === 'number') {
           return isAsc ? valA - valB : valB - valA;
        }
        valA = String(valA).toLowerCase(); valB = String(valB).toLowerCase();
        if (valA < valB) return isAsc ? -1 : 1;
        if (valA > valB) return isAsc ? 1 : -1;
        return 0;
     });
  }

  function handleGlobalFilter() {
      const search = document.getElementById('dashSearch').value.toLowerCase();
      
      const fkec = activeFilters.kec;
      const fpml = activeFilters.pml;
      const fppl = activeFilters.ppl;
      const fpj = activeFilters.pj;
      const fprio = activeFilters.prio;
      
      dashFilteredData = DASH_DATA.filter(r => {
          let mS = search === '' || `${r.idSls} ${r.nmsls} ${r.desa} ${r.ppl} ${r.pml}`.toLowerCase().includes(search);
          let mPrio = fprio === '' || String(r.prioritas) === fprio;
          let mKec = fkec.length === 0 || fkec.includes(r.kec);
          let mPml = fpml.length === 0 || fpml.includes(r.pml);
          let mPpl = fppl.length === 0 || fppl.includes(r.ppl);
          let mPj = fpj.length === 0 || fpj.includes(r.pj);
          return mS && mPrio && mKec && mPml && mPpl && mPj;
      });

      let tSls=0, tOpen=0, tDraft=0, tSub=0, tRej=0, tApp=0, tTot=0;
      dashFilteredData.forEach(r => {
          r.calcTotal = r.totalAbsolut || (r.open + r.draft + r.submit + r.reject + r.approve);
          r.agg_submit = r.submit + r.reject + r.approve;
          tSls++; tOpen+=r.open; tDraft+=r.draft; tSub+=r.submit; tRej+=r.reject; tApp+=r.approve; tTot+=r.calcTotal;
      });

      let pPend = tTot>0 ? (((tDraft+tSub+tRej+tApp)/tTot)*100).toFixed(1)+'%' : '0%';
      let pSubm = tTot>0 ? (((tSub+tRej+tApp)/tTot)*100).toFixed(1)+'%' : '0%';

      document.getElementById('dashTotSls').innerText = tSls.toLocaleString('id-ID');
      document.getElementById('dashTotTarget').innerText = tTot.toLocaleString('id-ID');
      document.getElementById('dashProgPendataan').innerHTML = `${(tDraft+tSub+tRej+tApp).toLocaleString('id-ID')} <span class="text-xs font-semibold opacity-70">(${pPend})</span>`;
      document.getElementById('dashProgSubmit').innerHTML = `${(tSub+tRej+tApp).toLocaleString('id-ID')} <span class="text-xs font-semibold opacity-70">(${pSubm})</span>`;
      document.getElementById('dashTotOpen').innerText = tOpen.toLocaleString('id-ID'); 
      document.getElementById('dashTotDraft').innerText = tDraft.toLocaleString('id-ID');
      document.getElementById('dashTotSubmit').innerText = tSub.toLocaleString('id-ID'); 
      document.getElementById('dashTotReject').innerText = tRej.toLocaleString('id-ID');
      document.getElementById('dashTotApprove').innerText = tApp.toLocaleString('id-ID');

      buildTabStates();
      dashCurrentPage = 1;
      renderCurrentTab();
  }

  function buildTabStates() {
      TAB_STATE[1] = dashFilteredData.map(r => ({ ...r, desaKec: r.desa + ' - ' + r.kec }));
      
      let pplM={}, pmlM={}, kecM={};
      dashFilteredData.forEach(r => {
          let kPpl = r.ppl+"_"+r.kec; 
          if(!pplM[kPpl]) pplM[kPpl]={ppl:r.ppl, kec:r.kec, email:r.emailPpl, o:0, d:0, agg_s:0, t:0, app:0};
          pplM[kPpl].o+=r.open; pplM[kPpl].d+=r.draft; pplM[kPpl].agg_s+=r.agg_submit; pplM[kPpl].t+=r.calcTotal; pplM[kPpl].app+=r.approve;
          
          let kPml = r.pml+"_"+r.kec; 
          if(!pmlM[kPml]) pmlM[kPml]={pml:r.pml, kec:r.kec, email:r.emailPml, o:0, d:0, sub:0, rej:0, app:0, t:0};
          pmlM[kPml].o+=r.open; pmlM[kPml].d+=r.draft; pmlM[kPml].sub+=r.submit; pmlM[kPml].rej+=r.reject; pmlM[kPml].app+=r.approve; pmlM[kPml].t+=r.calcTotal;
          
          let kKec = r.kec+"_"+r.pj; 
          if(!kecM[kKec]) kecM[kKec]={kec:r.kec, pj:r.pj, o:0, d:0, s:0, rej:0, app:0, t:0, agg_sra:0};
          kecM[kKec].o+=r.open; kecM[kKec].d+=r.draft; kecM[kKec].s+=r.submit; kecM[kKec].rej+=r.reject; kecM[kKec].app+=r.approve; kecM[kKec].agg_sra+=r.agg_submit; kecM[kKec].t+=r.calcTotal;
      });

      TAB_STATE[2] = Object.values(pplM).map(p => {
          p.target_absolut = Math.ceil((timingConfig.y/100)*p.t); 
          p.kekurangan = Math.max(0, p.target_absolut-p.agg_s);
          p.statusTarget = p.kekurangan<=0 ? 'Tercapai' : 'Belum Tercapai'; 
          p.avg_raw = Math.round((timingConfig.x>0 ? p.agg_s/timingConfig.x : 0)*100)/100;
          p.pct_pendataan = p.t>0 ? (((p.d+p.agg_s)/p.t)*100).toFixed(1) : '0.0'; 
          p.pct_submit = p.t>0 ? ((p.agg_s/p.t)*100).toFixed(1) : '0.0'; 
          p.pct_approve = p.t>0 ? ((p.app/p.t)*100).toFixed(1) : '0.0';
          return p;
      });

      TAB_STATE[3] = Object.values(pmlM).map(p => {
          p.target_absolut = Math.ceil((timingConfig.y/100)*p.t); 
          p.kekurangan = Math.max(0, p.target_absolut-p.app);
          p.statusTarget = p.kekurangan<=0 ? 'Tercapai' : 'Belum Tercapai'; 
          p.pct_open = p.t>0 ? ((p.o/p.t)*100).toFixed(1) : '0.0'; 
          p.pct_draft = p.t>0 ? ((p.d/p.t)*100).toFixed(1) : '0.0'; 
          p.pct_sub = p.t>0 ? ((p.sub/p.t)*100).toFixed(1) : '0.0'; 
          p.pct_rej = p.t>0 ? ((p.rej/p.t)*100).toFixed(1) : '0.0'; 
          p.pct_app = p.t>0 ? ((p.app/p.t)*100).toFixed(1) : '0.0';
          return p;
      });

      TAB_STATE[4] = Object.values(kecM).map(p => {
          p.pct_pendataan = p.t>0 ? (((p.d+p.agg_sra)/p.t)*100).toFixed(1) : '0.0';

          return p;
      });

      TAB_STATE[6] = dashFilteredData.map(r => { let e = r.extKel||{}; return { idSls:r.idSls, nmsls:r.nmsls, desaKec:r.desa+' - '+r.kec, ppl:r.ppl, pml:r.pml, emailPpl:r.emailPpl, emailPml:r.emailPml, pj:r.pj, prelist:e.prelist||0, ditemukan:e.ditemukan||0, baru:e.baru||0, meninggal:e.meninggal||0, tdk:e.tdk||0, isMismatch:r.isMismatch }; });

      TAB_STATE[8] = dashFilteredData.map(r => { let e = r.extUsKel||{}; return { idSls:r.idSls, nmsls:r.nmsls, desaKec:r.desa+' - '+r.kec, ppl:r.ppl, pml:r.pml, emailPpl:r.emailPpl, emailPml:r.emailPml, pj:r.pj, ditemukan:e.ditemukan||0, baru:e.baru||0, tutup:e.tutup||0, ganda:e.ganda||0, tdk:e.tdk||0, isMismatch:r.isMismatch }; });
  }

  function goDashPage(pageNum) { 
      dashCurrentPage = pageNum;

  }
  
  function generatePaginationHTML(totalItems, currentPage, rowsPerPage, callbackName) {
       const totalPages = Math.ceil(totalItems / rowsPerPage);
       if (totalPages <= 1) return '';
       let html = '<div class="flex flex-wrap gap-1">';
       html += `<button onclick="${callbackName}(${currentPage - 1})" class="px-2 py-1 rounded border border-gray-300 text-xs font-semibold text-gray-600 hover:bg-gray-100 disabled:opacity-50 transition" ${currentPage === 1 ? 'disabled' : ''}>&laquo;</button>`;
       let startPage = Math.max(1, currentPage - 2);
       let endPage = Math.min(totalPages, currentPage + 2);
       for (let i = startPage; i <= endPage; i++) {
           let activeClass = i === currentPage ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-100';
           html += `<button onclick="${callbackName}(${i})" class="px-3 py-1 rounded border ${activeClass} text-xs font-semibold transition">${i}</button>`;
       }
       html += `<button onclick="${callbackName}(${currentPage + 1})" class="px-2 py-1 rounded border border-gray-300 text-xs font-semibold text-gray-600 hover:bg-gray-100 disabled:opacity-50 transition" ${currentPage === totalPages ? 'disabled' : ''}>&raquo;</button>`;
       return html + '</div>';
  }

  // --- RENDERER TAB 5 (CHART VISUALISASI) ---
  function renderVisualisasi() {
     let kecM = {}; 
     dashFilteredData.forEach(r => {
        let k = r.kec || 'Tanpa Kecamatan';
        if(!kecM[k]) kecM[k] = {o:0, d:0, s:0, rej:0, a:0, tot:0};
        kecM[k].o += r.open; kecM[k].d += r.draft; kecM[k].s += r.submit; kecM[k].a += r.approve; kecM[k].rej += r.reject; kecM[k].tot += r.calcTotal;
     });
     kecChartMapGlobal = kecM;
     let sortK = Object.entries(kecM).sort((a, b) => {
         let pA = a[1].tot>0 ? ((a[1].s+a[1].rej+a[1].a)/a[1].tot) : 0; 
         let pB = b[1].tot>0 ? ((b[1].s+b[1].rej+b[1].a)/b[1].tot) : 0;
         return pB - pA; 
     });
     
     let lbls = sortK.map(x => x[0]);
     let dO = sortK.map(x => x[1].tot>0 ? ((x[1].o/x[1].tot)*100).toFixed(2) : 0); 
     let dD = sortK.map(x => x[1].tot>0 ? ((x[1].d/x[1].tot)*100).toFixed(2) : 0);
     let dS = sortK.map(x => x[1].tot>0 ? ((x[1].s/x[1].tot)*100).toFixed(2) : 0); 
     let dR = sortK.map(x => x[1].tot>0 ? ((x[1].rej/x[1].tot)*100).toFixed(2) : 0);
     let dA = sortK.map(x => x[1].tot>0 ? ((x[1].a/x[1].tot)*100).toFixed(2) : 0);

     if(chartKecObj) chartKecObj.destroy();
     let cv = document.getElementById('chartKecamatan');
     if(cv) {
         document.getElementById('chartInner').style.height = Math.max(400, lbls.length*40) + 'px';
         chartKecObj = new Chart(cv, {
             type: 'bar', 
             data: { 
                 labels: lbls, 
                 datasets: [ 
                     { label: 'Open', data: dO, backgroundColor: '#3b82f6', borderRadius: 2 }, 
                     { label: 'Draft', data: dD, backgroundColor: '#f59e0b', borderRadius: 2 }, 
                     { label: 'Submit', data: dS, backgroundColor: '#9333ea', borderRadius: 2 }, 
                     { label: 'Reject', data: dR, backgroundColor: '#dc2626', borderRadius: 2 }, 
                     { label: 'Approved', data: dA, backgroundColor: '#16a34a', borderRadius: 2 } 
                 ] 
             },
             options: { 
                 indexAxis: 'y', maintainAspectRatio: false, responsive: true, interaction: { mode: 'y', intersect: true }, 
                 scales: { 
                     x: { stacked: true, max: 100, grid: { display: false }, ticks: { callback: v => v+'%' } }, 
                     y: { stacked: true } 
                 }, 
                 plugins: { 
                     legend: { display: true, position: 'top', labels: {font:{family:'Inter', weight:'600'}} }, 
                     tooltip: { 
                         enabled: true, position: 'nearest', 
                         callbacks: { 
                             label: c => (c.dataset.label||'') + ': ' + (c.parsed.x||0) + '%', 
                             footer: (i) => `Total Target: ${kecChartMapGlobal[i[0].label].tot}\nTotal Submit Absolut: ${kecChartMapGlobal[i[0].label].s+kecChartMapGlobal[i[0].label].rej+kecChartMapGlobal[i[0].label].a}` 
                         } 
                     } 
                 },
                 layout: { padding: { left: 10, right: 20, top: 10, bottom: 10 } } 
             }
         });
     }
  }

  async function processUploads(fKel, fUsa) {
     Swal.fire({
         title: 'Memproses Data...', 
         html: '<b>Sistem</b> sedang mengekstrak ribuan baris Excel Anda di belakang layar...<br><span class="text-xs text-red-500 italic mt-2 block">Dilarang menutup browser!</span>', 
         allowOutsideClick: false, didOpen: () => Swal.showLoading()
     });
     try {
       if(fKel) { 
           let dataKel = await parseExcelKeluarga(fKel); 
           await sendToGAS('keluarga', dataKel); 
       }
       if(fUsa) { 
           let dataUsa = await parseExcelUsahaAll(fUsa); 
           if(dataUsa.bku && dataUsa.bku.length > 1) await sendToGAS('usaha_bku', dataUsa.bku); 
           if(dataUsa.kel && dataUsa.kel.length > 1) await sendToGAS('usaha_kel', dataUsa.kel); 
       }
       Swal.fire('Integrasi Berhasil!', 'Data Eksternal telah tersimpan ke Database dan siap dianalisa.', 'success').then(()=>{ location.reload(); });
     } catch (err) { 
         Swal.fire('Gagal Ekstrak', 'Terjadi kesalahan format Excel: ' + String(err), 'error'); 
     }
  }

  function sendToGAS(tipe, dataArray) {
     return fetch(GAS_API_URL, { 
         method: 'POST', 
         headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
         body: JSON.stringify({ type: tipe, data: dataArray }) 
     }).then(r => r.json());
  }

  // --- PERBAIKAN BUG PROMISES: res -> resolve, rej -> reject ---
  function parseExcelKeluarga(f) {
    return new Promise((resolve, reject) => { 
        let r = new FileReader(); 
        r.onload = e => { 
            try {
                let wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'}); 
                let sName = wb.SheetNames.find(s => s.toUpperCase() === 'KELUARGA');
                if(!sName) return reject("Sheet bernama 'KELUARGA' tidak ditemukan dalam file.");
                
                let rows = XLSX.utils.sheet_to_json(wb.Sheets[sName], {header: 1}); 
                let out = [["KODE_16", "PRELIST", "DITEMUKAN", "BARU", "MENINGGAL", "TIDAK_DITEMUKAN"]]; 
                let cIdx = {p:-1, d:-1, b:-1, m:-1, t:-1}; 
                let start = false;

                rows.forEach(r => { 
                    if(!r || !r.length) return; 
                    if(!start) { 
                        if(String(r[0]).trim().toUpperCase() === 'KODE') { 
                            start = true; 
                            for(let c=0; c<r.length; c++){ 
                                let h = String(r[c]||'').toUpperCase().trim(); 
                                if(h.includes('PRELIST')) cIdx.p=c; 
                                else if(h==='DITEMUKAN') cIdx.d=c; 
                                else if(h.includes('KELUARGA BARU')) cIdx.b=c; 
                                else if(h==='MENINGGAL') cIdx.m=c; 
                                else if(h==='TIDAK DITEMUKAN') cIdx.t=c; 
                            } 
                        } 
                        return; 
                    }
                    if(String(r[0]||'').trim().length === 16) {
                        out.push([ String(r[0]).trim(), Number(r[cIdx.p]||0), Number(r[cIdx.d]||0), Number(r[cIdx.b]||0), Number(r[cIdx.m]||0), Number(r[cIdx.t]||0) ]); 
                    }
                }); 
                resolve(out); 
            } catch(err) { reject(err); }
        }; 
        r.readAsArrayBuffer(f); 
    });
  }

  function parseExcelUsahaAll(f) {
    return new Promise((resolve, reject) => { 
      let r = new FileReader(); 
      r.onload = e => { 
        try {
          let wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'}); 
          let rB = [["KODE_16", "PRELIST", "DITEMUKAN", "BARU", "TUTUP", "GANDA", "TIDAK_DITEMUKAN"]]; 
          let rK = [["KODE_16", "DITEMUKAN", "BARU", "TUTUP", "GANDA", "TIDAK_DITEMUKAN"]];
          
          let sUP = wb.SheetNames.find(s => s.toUpperCase().includes('USAHA PERUSAHAAN'));
          if(sUP) { 
              let rows = XLSX.utils.sheet_to_json(wb.Sheets[sUP], {header: 1}); 
              let cIdx = {p:-1, d:-1, b:-1, tu:-1, g:-1, t:-1}; 
              let start = false; 
              rows.forEach(r => { 
                  if(!r || !r.length) return; 
                  if(!start) { 
                      if(String(r[0]).trim().toUpperCase() === 'KODE') { 
                          start = true; 
                          for(let c=0; c<r.length; c++){ 
                              let h = String(r[c]||'').toUpperCase().trim(); 
                              if(h.includes('PRELIST')) cIdx.p=c; 
                              else if(h==='DITEMUKAN') cIdx.d=c; 
                              else if(h==='BARU') cIdx.b=c; 
                              else if(h==='TUTUP') cIdx.tu=c; 
                              else if(h==='GANDA') cIdx.g=c; 
                              else if(h==='TIDAK DITEMUKAN') cIdx.t=c; 
                          } 
                      } 
                      return; 
                  } 
                  if(String(r[0]||'').trim().length === 16) {
                      rB.push([String(r[0]).trim(), Number(r[cIdx.p]||0), Number(r[cIdx.d]||0), Number(r[cIdx.b]||0), Number(r[cIdx.tu]||0), Number(r[cIdx.g]||0), Number(r[cIdx.t]||0)]); 
                  }
              }); 
          }
          
          let sUK = wb.SheetNames.find(s => s.toUpperCase().includes('USAHA KELUARGA'));
          if(sUK) { 
              let rows = XLSX.utils.sheet_to_json(wb.Sheets[sUK], {header: 1}); 
              let cIdx = {d:-1, b:-1, tu:-1, g:-1, t:-1}; 
              let start = false; 
              rows.forEach(r => { 
                  if(!r || !r.length) return; 
                  if(!start) { 
                      if(String(r[0]).trim().toUpperCase() === 'KODE') { 
                          start = true; 
                          for(let c=0; c<r.length; c++){ 
                              let h = String(r[c]||'').toUpperCase().trim(); 
                              if(h==='DITEMUKAN') cIdx.d=c; 
                              else if(h==='BARU') cIdx.b=c; 
                              else if(h==='TUTUP') cIdx.tu=c; 
                              else if(h==='GANDA') cIdx.g=c; 
                              else if(h==='TIDAK DITEMUKAN') cIdx.t=c; 
                          } 
                      } 
                      return; 
                  } 
                  if(String(r[0]||'').trim().length === 16) {
                      rK.push([String(r[0]).trim(), Number(r[cIdx.d]||0), Number(r[cIdx.b]||0), Number(r[cIdx.tu]||0), Number(r[cIdx.g]||0), Number(r[cIdx.t]||0)]); 
                  }
              }); 
          }
          resolve({bku: rB, kel: rK}); 
        } catch(err) { reject(err); }
      }; 
      r.readAsArrayBuffer(f); 
    });
  }

  function exportDashboardExcel() {
    if(dashFilteredData.length === 0) return Swal.fire('Info', 'Data kosong', 'info');
    const exportData = dashFilteredData.map((row, idx) => ({
      "No": idx + 1, "ID SLS": row.idSls, "Kecamatan": row.kec, "Desa": row.desa, "Nama SLS": row.nmsls, "Prioritas": row.prioritas === 1 ? "Ya" : "Tidak", 
      "PJ Kuda": row.pj, "PML": row.pml, "Email PML": row.emailPml, "PPL": row.ppl, "Email PPL": row.emailPpl,
      "Open": row.open, "Draft": row.draft, "Submit": row.submit, "Reject": row.reject, "Approve": row.approve, "Total Target": row.calcTotal
    }));
    const worksheet = XLSX.utils.json_to_sheet(exportData);
    const workbook = XLSX.utils.book_new(); 
    XLSX.utils.book_append_sheet(workbook, worksheet, "Progress_FASIH");
    XLSX.writeFile(workbook, `Rekap_Monitoring_FASIH_${new Date().toISOString().slice(0,10)}.xlsx`);
  }

  function downloadImage() {

       const btn = document.getElementById('btnImage'); 
       const originalText = btn.innerHTML; 
       btn.innerHTML = 'PROSES...'; 
       btn.disabled = true;

       const element = document.getElementById('captureArea'); 
       const watermarkHeader = document.getElementById('watermarkHeader');
       
       document.getElementById('watermarkText').innerHTML = `HARI KE - ${timingConfig.x} | TARGET PROGRESS : ${timingConfig.y.toFixed(2)}% | TERAKHIR SINKRONISASI: ${document.getElementById('txtLastUpdate').innerText}`;
       watermarkHeader.classList.remove('hidden'); watermarkHeader.classList.add('flex');
       
       const originalWidth = element.style.width; const originalOverflow = element.style.overflow;
       window.scrollTo(0,0); document.documentElement.scrollLeft = 0; document.body.scrollLeft = 0; element.scrollLeft = 0; 
       
       element.classList.remove('overflow-auto', 'flex-1', 'min-h-0'); element.classList.add('h-max'); element.style.overflow = 'visible'; 
       const fullWidth = element.scrollWidth; element.style.width = fullWidth + 'px'; element.style.maxWidth = 'none';

       html2canvas(element, { scale: 2, useCORS: true, scrollX: 0, scrollY: 0, windowWidth: fullWidth, width: fullWidth }).then(canvas => {
           watermarkHeader.classList.add('hidden'); watermarkHeader.classList.remove('flex'); 
           element.style.width = originalWidth; element.style.overflow = originalOverflow;
           element.classList.add('overflow-auto', 'flex-1', 'min-h-0'); element.classList.remove('h-max');
           
           let link = document.createElement('a'); 
           link.download = `Dashboard_FASIH_${new Date().toISOString().slice(0,10)}.png`; 
           link.href = canvas.toDataURL('image/png'); 
           link.click();

           btn.innerHTML = originalText; btn.disabled = false;
       }).catch(err => {
           watermarkHeader.classList.add('hidden'); watermarkHeader.classList.remove('flex');
           element.style.width = originalWidth; element.style.overflow = originalOverflow;
           element.classList.add('overflow-auto', 'flex-1', 'min-h-0'); element.classList.remove('h-max');
           btn.innerHTML = originalText; btn.disabled = false;

       watermarkHeader.classList.remove('hidden'); watermarkHeader.classList.add('flex');

       let optOpt = {
          margin: [0.3, 0.2, 0.3, 0.3],

          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, scrollX: 0, scrollY: 0, x: 0, y: 0, windowWidth: fullWidth, width: fullWidth },
          jsPDF: { unit: 'in', format: 'a3', orientation: 'landscape' }, 
          pagebreak: { mode: ['css', 'legacy'], avoid: ['tr', 'td', 'th'] } 
       };

       html2pdf().set(optOpt).from(element).save().then(() => {
           watermarkHeader.classList.add('hidden'); watermarkHeader.classList.remove('flex'); 
           element.style.width = originalWidth; element.style.overflow = originalOverflow;
           element.classList.add('overflow-auto', 'flex-1', 'min-h-0'); element.classList.remove('h-max'); 
           btn.innerHTML = originalText; btn.disabled = false;

           element.classList.add('overflow-auto', 'flex-1', 'min-h-0'); element.classList.remove('h-max');
           btn.innerHTML = originalText; btn.disabled = false;
