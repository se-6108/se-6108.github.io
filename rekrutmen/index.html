<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Test Google</title>
    
    <meta property="og:title" content="Test Google">
    <meta name="description" content="Hehe test google">
    <meta property="og:description" content="Hehe test google">
    
    <meta property="og:image" content="https://se-6108.github.io/rekrutmen/icon.png">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
    <meta property="og:type" content="website">
    
    <meta property="og:url" content="https://se-6108.github.io/rekrutmen/">

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="shortcut icon" href="icon.png">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #f0f2f5; 
        }
        
        .iframe-container {
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            border: none;
            position: absolute;
            left: 0;
            
            /* Trik menutup banner GAS */
            top: -4px; 
            height: calc(100% + 4px); 
            
            display: block;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe 
            src="https://google.com"
            allow="geolocation; microphone; camera; fullscreen">
        </iframe>
    </div>

</body>
</html>
