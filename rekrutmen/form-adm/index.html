<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Form Administrasi Mitra Tambahan</title>
    
    <meta property="og:title" content="Form Administrasi Mitra Tambahan">
    <meta name="description" content="Form ini diisi mandiri oleh calon mitra yang mengikuti wawancara offline">
    <meta property="og:description" content="Form ini diisi mandiri oleh calon mitra yang mengikuti wawancara offline">
    
    <meta property="og:image" content="http://se-6108.github.io/rekrutmen/form-adm/icon.png">
    <meta property="og:image:width" content="300">
    <meta property="og:image:height" content="300">
    <meta property="og:type" content="website">
    
    <meta property="og:url" content="http://se-6108.github.io/rekrutmen/form-adm/">

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="shortcut icon" href="icon.png">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #f0f2f5; 
        }
        
        .iframe-container {
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            border: none;
            position: absolute;
            left: 0;
            top: -4px;
            height: calc(100% + 4px); 
            display: block;
        }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbyZ2dwmnLVw-fDgHi_0658uP7O7h4okblQnRG0R94RPyhFMmUoiHQaeBwgaHQLrPE8k/exec"
            allow="geolocation; microphone; camera; fullscreen">
        </iframe>
    </div>

</body>
</html>
