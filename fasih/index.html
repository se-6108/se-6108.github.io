<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="icon.png">
    <title>Dashboard FASIH | Under Maintenance</title>
    <meta property="og:title" content="Dashboard Monitoring FASIH - Sedang Diperbarui">
    <meta property="og:description" content="Sistem sedang dalam perbaikan rutin. Kami akan segera kembali.">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
        }
        
        /* Animasi Latar Belakang (Blobs) */
        .blob {
            position: absolute;
            filter: blur(60px);
            z-index: 0;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 {
            top: -10%; left: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(37,99,235,0.3) 0%, rgba(37,99,235,0) 70%);
            animation-delay: 0s;
        }
        .blob-2 {
            bottom: -20%; right: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(147,51,234,0.25) 0%, rgba(147,51,234,0) 70%);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(226, 232, 240, 0.5);
        }

        /* Loader Animation */
        .pulse-ring {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
            opacity: 0.2;
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center overflow-hidden selection:bg-blue-200 selection:text-blue-900">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <div class="absolute inset-0 z-0 opacity-[0.03]" style="background-image: radial-gradient(#000 1px, transparent 1px); background-size: 24px 24px;"></div>

    <main class="relative z-10 w-full max-w-lg px-6">
        <div class="glass-card rounded-[2rem] p-10 text-center flex flex-col items-center">
            
            <div class="relative flex items-center justify-center w-24 h-24 mb-8">
                <div class="pulse-ring"></div>
                <div class="absolute inset-0 bg-blue-100 rounded-full opacity-50"></div>
                <div class="relative z-10 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white p-4 rounded-full shadow-lg shadow-blue-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 animate-[spin_4s_linear_infinite]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </div>
            </div>

            <div class="inline-flex items-center gap-2 px-3 py-1 mb-4 rounded-full bg-amber-50 border border-amber-200">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span>
                </span>
                <span class="text-[10px] font-black tracking-widest uppercase text-amber-700">System Update</span>
            </div>
            
            <h1 class="text-2xl font-black text-slate-800 mb-3 tracking-tight">
                Sedang Dalam Perbaikan
            </h1>
            
            <p class="text-sm font-medium text-slate-500 leading-relaxed mb-8">
                Dashboard Monitoring FASIH Sensus Ekonomi 2026 sedang dioptimalkan. Kami sedang melakukan sinkronisasi backend dan peningkatan antarmuka.
            </p>

            <div class="w-full bg-slate-100 rounded-full h-1.5 mb-2 overflow-hidden border border-slate-200">
                <div class="bg-blue-600 h-1.5 rounded-full animate-[pulse_2s_ease-in-out_infinite]" style="width: 70%"></div>
            </div>
            <div class="flex justify-between w-full px-1">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Status: Maintenance</span>
                <span class="text-[9px] font-bold text-blue-500 uppercase tracking-wider">Segera Kembali</span>
            </div>

        </div>

        <div class="text-center mt-8">
            <p class="text-xs font-semibold text-slate-400">
                &copy; 2026 Tim Pengembang Dashboard FASIH
            </p>
        </div>
    </main>

</body>
</html>
